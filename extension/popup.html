<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>淘宝评论助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h2>🛒 淘宝评论助手</h2>
  </div>

  <div id="status" class="status">
    <div class="instructions">
      <strong>使用说明：</strong>
      <ol>
        <li>打开淘宝/天猫商品详情页</li>
        <li>点击下方按钮开始提取</li>
        <li>插件自动翻页并提取数据</li>
        <li>完成后点击"导出数据"</li>
      </ol>
    </div>
  </div>

  <!-- 评论区提取按钮 -->
  <div class="section">
    <div class="section-title">📝 评论提取</div>
    <button id="startBtn" class="button button-primary">
      🚀 开始提取评论
    </button>

    <button id="stopBtn" class="button button-secondary" style="display:none;">
      ⏸ 停止提取
    </button>

    <button id="exportBtn" class="button button-secondary" disabled>
      📥 导出评论
    </button>
  </div>

  <!-- 问大家提取按钮 -->
  <div class="section">
    <div class="section-title">❓ 问大家</div>
    <button id="startQaBtn" class="button button-primary">
      🚀 开始提取问答
    </button>

    <button id="stopQaBtn" class="button button-secondary" style="display:none;">
      ⏸ 停止提取
    </button>

    <button id="exportQaBtn" class="button button-secondary" disabled>
      📥 导出问答
    </button>
  </div>

  <button id="analyzeBtn" class="button button-success" disabled>
    📊 一键分析（生成报告）
  </button>

  <div id="analyzeTip" class="tip tip-success" style="display:none;">
    <strong>✅ 数据已保存！</strong><br>
    请运行以下命令生成报告：<br>
    <code>python3 analyze_reviews.py output/crawler/评论数据_*.csv</code>
  </div>

  <div id="progress" class="progress">
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div class="count">
      <span id="count">0</span> 条数据
    </div>
  </div>

  <div class="footer">
    <p>支持淘宝/天猫/天猫国际</p>
    <p>评论 + 问大家双模式提取</p>
    <p class="mt-1">版本 2.9.4</p>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
