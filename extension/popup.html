<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>淘宝评论助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h2>🛒 淘宝评论助手</h2>
  </div>

  <div id="status" class="status">
    <div class="instructions">
      <strong>使用说明：</strong>
      <ol>
        <li>打开淘宝/天猫商品详情页</li>
        <li>滚动到评论区</li>
        <li>点击下方"开始爬取"按钮</li>
        <li>插件自动翻页并提取评论</li>
        <li>完成后点击"导出数据"</li>
      </ol>
    </div>
  </div>

  <button id="startBtn" class="button button-primary">
    🚀 开始爬取评论
  </button>

  <button id="stopBtn" class="button button-secondary" style="display:none;">
    ⏸ 停止爬取
  </button>

  <button id="exportBtn" class="button button-secondary" disabled>
    📥 导出数据
  </button>

  <button id="analyzeBtn" class="button button-success" disabled>
    📊 一键分析（生成报告）
  </button>

  <div id="analyzeTip" class="tip tip-success" style="display:none;">
    <strong>✅ 数据已保存！</strong><br>
    请运行以下命令生成报告：<br>
    <code>python3 analyze_reviews.py output/crawler/评论数据_*.csv</code>
  </div>

  <div id="progress" class="progress">
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div class="count">
      <span id="count">0</span> 条评论
    </div>
  </div>

  <div class="footer">
    <p>数据会自动保存为Excel/CSV格式</p>
    <p>支持淘宝和天猫平台</p>
    <p class="mt-1">版本 2.0.0 - 独立封装版</p>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
