<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>淘宝评论助手</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="header-logo header__logo">
      <span class="logo-icon header__icon">🛒</span>
      <div class="header-text">
        <h1 class="header__title">淘宝评论助手</h1>
        <span class="version header__version">v3.1.0</span>
      </div>
    </div>
    <button id="toggleGuide" class="icon-btn" title="使用说明" aria-label="切换使用说明" aria-expanded="false">
      <span>❓</span>
    </button>
  </header>

  <!-- 使用说明（默认收起 - 确定性优化） -->
  <div id="guidePanel" class="guide-panel">
    <div class="guide-content guide-panel__content">
      <strong>快速开始：</strong>
      <ol class="guide-panel__list">
        <li>在淘宝/天猫商品详情页</li>
        <li>选择下方的"评论"或"问答"标签</li>
        <li>点击"开始提取"按钮</li>
        <li>等待自动抓取完成</li>
        <li>导出数据进行分析</li>
      </ol>
    </div>
  </div>

  <!-- 状态区域（优化版 - 更清晰的反馈） -->
  <div id="statusCard" class="status-card status-card--ready">
    <div id="statusIcon" class="status-icon status-card__icon">🌐</div>
    <div class="status-info status-card__info">
      <div id="statusTitle" class="status-title status-card__title">准备就绪</div>
      <div id="statusDesc" class="status-desc status-card__desc">请先访问商品详情页</div>
    </div>
  </div>

  <!-- 标签页导航 -->
  <nav class="tab-nav" role="tablist">
    <button id="tabReviews" class="tab-btn tab-btn--active" data-tab="reviews" role="tab" aria-selected="true" aria-controls="tab-reviews">
      <span class="tab-icon tab-btn__icon" aria-hidden="true">💬</span>
      <span>评论</span>
    </button>
    <button id="tabQa" class="tab-btn" data-tab="qa" role="tab" aria-selected="false" aria-controls="tab-qa">
      <span class="tab-icon tab-btn__icon" aria-hidden="true">❓</span>
      <span>问答</span>
    </button>
  </nav>

  <!-- 评论提取面板 -->
  <div id="tab-reviews" class="tab-panel tab-panel--active" role="tabpanel" aria-labelledby="tabReviews">
    <div class="action-card">
      <div class="action-header action-card__header">
        <span class="action-title action-card__title">评论数据提取</span>
        <span id="reviewCount" class="badge">0 条</span>
      </div>

      <!-- 主操作按钮组（优化版 - 互斥显示） -->
      <div class="action-buttons">
        <button id="startBtn" class="btn btn--primary" aria-label="开始提取评论">
          <span class="btn__icon" aria-hidden="true">🚀</span>
          <span>开始提取</span>
        </button>
        <button id="stopBtn" class="btn btn--warning hidden" aria-label="停止提取评论">
          <span class="btn__icon" aria-hidden="true">⏸</span>
          <span>停止提取</span>
        </button>
      </div>

      <!-- 进度条（默认隐藏） -->
      <div id="progressContainer" class="progress-container">
        <div class="progress-info progress-container__info">
          <span id="progressText">正在提取...</span>
          <span id="progressPercent" class="progress-percent progress-container__percent">0%</span>
        </div>
        <div class="progress-bar progress-container__bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="progressFill" class="progress-fill progress-container__fill"></div>
        </div>
        <div id="progressDetail" class="progress-detail progress-container__detail" aria-live="polite">滚动 0 次 | 0 条评论</div>
      </div>

      <!-- 导出按钮组 -->
      <div class="export-group">
        <button id="exportBtn" class="btn btn--secondary" disabled aria-label="导出评论数据">
          <span class="btn__icon" aria-hidden="true">📥</span>
          <span>导出 CSV</span>
        </button>
        <button id="analyzeBtn" class="btn btn--success" disabled aria-label="一键分析数据">
          <span class="btn__icon" aria-hidden="true">📊</span>
          <span>一键分析</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 问大家面板 -->
  <div id="tab-qa" class="tab-panel" role="tabpanel" aria-labelledby="tabQa">
    <div class="action-card">
      <div class="action-header action-card__header">
        <span class="action-title action-card__title">问答数据提取</span>
        <span id="qaCount" class="badge">0 条</span>
      </div>

      <!-- 主操作按钮组 -->
      <div class="action-buttons">
        <button id="startQaBtn" class="btn btn--primary" aria-label="开始提取问答">
          <span class="btn__icon" aria-hidden="true">🚀</span>
          <span>开始提取</span>
        </button>
        <button id="stopQaBtn" class="btn btn--warning hidden" aria-label="停止提取问答">
          <span class="btn__icon" aria-hidden="true">⏸</span>
          <span>停止提取</span>
        </button>
      </div>

      <!-- 进度条 -->
      <div id="qaProgressContainer" class="progress-container">
        <div class="progress-info progress-container__info">
          <span id="qaProgressText">正在提取...</span>
          <span id="qaProgressPercent" class="progress-percent progress-container__percent">0%</span>
        </div>
        <div class="progress-bar progress-container__bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="qaProgressFill" class="progress-fill progress-container__fill"></div>
        </div>
        <div id="qaProgressDetail" class="progress-detail progress-container__detail" aria-live="polite">滚动 0 次 | 0 个回答</div>
      </div>

      <!-- 导出按钮 -->
      <div class="export-group">
        <button id="exportQaBtn" class="btn btn--secondary" disabled aria-label="导出问答数据">
          <span class="btn__icon" aria-hidden="true">📥</span>
          <span>导出问答</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 分析提示 -->
  <div id="analyzeTip" class="tip-card hidden" role="status" aria-live="polite">
    <div class="tip-header tip-card__header">
      <span class="tip-icon tip-card__icon" aria-hidden="true">✅</span>
      <span class="tip-title tip-card__title">数据已保存</span>
    </div>
    <div class="tip-body tip-card__body">
      <p>文件已保存到项目目录</p>
      <code id="savedPath" class="code-block"></code>
      <p class="tip-command-title tip-card__command-title">运行命令生成报告：</p>
      <code id="commandBlock" class="code-block code-block--command"></code>
      <button id="copyCommand" class="btn btn--sm btn--ghost" aria-label="复制命令">
        <span class="btn__icon" aria-hidden="true">📋</span>
        <span>复制命令</span>
      </button>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="platform-tags footer__tags">
      <span class="tag">淘宝</span>
      <span class="tag">天猫</span>
      <span class="tag">天猫国际</span>
    </div>
    <p class="copyright footer__copyright">Product Review Analysis Team</p>
  </footer>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
